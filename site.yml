site:
  title: Voice Agents Lab
  start_page: voice-agents::index.adoc

content:
  sources:
    - url: .
      branches: HEAD
      start_path: content

ui:
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/patternfly-6/ui-bundle.zip
    snapshot: true
  supplemental_files:
    - path: ./content/supplemental-ui
    - path: partials/footer-scripts.hbs
      contents: |
        <script defer src="{{uiRootPath}}/js/vendor/clipboard.js"></script>
        <script defer src="{{uiRootPath}}/js/site.js"></script>
        <script defer src="{{uiRootPath}}/js/vendor/highlight.js"></script>
        <script>
        (function () {
          document.addEventListener('click', function (e) {
            var btn = e.target.closest('.copy-button, [data-clipboard-snippet]');
            if (!btn) return;
            var code = btn.nextElementSibling;
            if (!code) return;
            var text = code.textContent.trim();
            if (text && window.parent !== window) {
              window.parent.postMessage({ type: 'copy', text: text }, '*');
            }
          });
        })();
        </script>

output:
  dir: ./www

asciidoc:
  attributes:
    page-pagination: true
    sectlinks: true
    sectanchors: true
    icons: font
    source-highlighter: highlight.js
    toc: left
    toclevels: 3
    numbered: true
