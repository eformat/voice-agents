---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-nemoguard-runtime
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/template-display-name: vLLM ServingRuntime for NemoGuard
    openshift.io/display-name: vLLM ServingRuntime for NemoGuard
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  annotations:
    prometheus.io/port: '8080'
    prometheus.io/path: '/metrics'
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:ec799bb5eeb7e25b4b25a8917ab5161da6b6f1ab830cbba61bba371cffb0c34d
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - "--port=8080"
        - "--model=/mnt/models"
        - "--served-model-name={{.Name}}"
        - "--gpu-memory-utilization=0.95"
        - "--max-model-len=4096"
        - "--enforce-eager"
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: content-safety-detector
  labels:
    opendatahub.io/dashboard: 'true'
    kueue.x-k8s.io/queue-name: unreserved
  annotations:
    openshift.io/display-name: content-safety-detector
    serving.knative.openshift.io/enablePassthrough: 'true'
    sidecar.istio.io/inject: 'true'
    security.opendatahub.io/enable-auth: 'false'
    sidecar.istio.io/rewriteAppHTTPProbers: 'true'
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      name: ''
      resources:
        limits:
          cpu: '2'
          memory: 8Gi
          nvidia.com/mig-2g.35gb: '1'
        requests:
          cpu: '2'
          memory: 8Gi
          nvidia.com/mig-2g.35gb: '1'
      runtime: vllm-nemoguard-runtime
      storage:
        key: aws-connection-data-connection
        path: llama-3.1-nemoguard-8b-content-safety-merged
